name: Issue Gmonetization Certificate

on:
  workflow_dispatch: # Adds a button to trigger manually via the UI
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pass.log' # Assuming the CLI test generates this file upon passing

jobs:
  generate-certificate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate SVG Certificate
        run: |
          # Pass the GitHub username of the person who opened the PR
          node templates/generate-cert.js '${{ github.actor }}' '100'
          
      - name: Commit Certificate to PR Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add certificates/
          git commit -m "🎓 Auto-generated certificate for ${{ github.actor }}" || echo "No changes to commit"
          git push
