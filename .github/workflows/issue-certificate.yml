name: Issue Gmonetization Certificate

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pass.log'

jobs:
  generate-certificate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # Checks out PR branch if it exists, otherwise defaults to the branch that triggered it
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate SVG Certificate
        run: |
          node templates/generate-cert.js '${{ github.actor }}' '100'
          
      - name: Commit Certificate
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add certificates/
          git commit -m "🎓 Auto-generated certificate for ${{ github.actor }}" || echo "No changes to commit"
          git push
